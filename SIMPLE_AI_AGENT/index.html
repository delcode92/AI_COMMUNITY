<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Agent Platform</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1b26;
            --surface-2: #24283b;
            --surface-3: #292e42;
            --border: #3b4261;
            --text: #a9b1d6;
            --text-bright: #c0caf5;
            --text-dim: #545c7e;
            --accent: #7aa2f7;
            --accent-hover: #5d87e0;
            --green: #9ece6a;
            --red: #f7768e;
            --orange: #ff9e64;
            --purple: #bb9af7;
            --radius: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

        /* Header */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .header h1 { font-size: 15px; color: var(--text-bright); font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .header h1 span { font-size: 11px; color: var(--accent); background: rgba(122,162,247,0.1); padding: 2px 6px; border-radius: 4px; font-weight: 400; }
        .header .controls { display: flex; gap: 8px; align-items: center; }
        .header input[type="text"] { background: var(--surface-2); border: 1px solid var(--border); color: var(--text-bright); padding: 5px 10px; border-radius: var(--radius); font-size: 12px; width: 160px; }
        .header input[type="password"] { background: var(--surface-2); border: 1px solid var(--border); color: var(--text-bright); padding: 5px 10px; border-radius: var(--radius); font-size: 12px; width: 150px; }
        .header select { background: var(--surface-2); border: 1px solid var(--border); color: var(--text-bright); padding: 5px 10px; border-radius: var(--radius); font-size: 12px; cursor: pointer; }
        .header select option { background: var(--surface-2); color: var(--text-bright); }
        .btn { background: var(--accent); color: var(--bg); border: none; padding: 5px 12px; border-radius: var(--radius); font-size: 12px; cursor: pointer; font-weight: 500; transition: background 0.2s; }
        .btn:hover { background: var(--accent-hover); }
        .btn-sm { padding: 4px 10px; font-size: 11px; }

        /* Layout */
        .layout { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 190px; background: var(--surface); border-right: 1px solid var(--border); padding: 12px; overflow-y: auto; flex-shrink: 0; }
        .sidebar h3 { font-size: 10px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; letter-spacing: 0.05em; }
        .tool-item { font-size: 11px; padding: 5px 8px; border-radius: 4px; margin-bottom: 2px; cursor: default; opacity: 0.8; }
        .tool-item:hover { background: var(--surface-2); opacity: 1; }
        .tool-item .tool-cat { color: var(--orange); font-size: 9px; opacity: 0.7; }

        /* Main area: chat + trace */
        .main { display: flex; flex-direction: column; flex: 1; min-width: 0; }

        /* Conversation area */
        .chat-area { display: flex; flex-direction: column; flex: 1; min-height: 0; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 75%; padding: 10px 14px; border-radius: var(--radius); line-height: 1.6; white-space: pre-wrap; word-break: break-word; font-size: 13px; }
        .msg.user { align-self: flex-end; background: var(--accent); color: var(--bg); color-scheme: dark; }
        .msg.assistant { align-self: flex-start; background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
        .msg.system { align-self: center; background: transparent; color: var(--text-dim); font-size: 11px; text-align: center; }

        /* Process Trace */
        .trace { max-height: 200px; overflow-y: auto; background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 12px 16px; flex-shrink: 0; }
        .trace:empty { display: none; }
        .trace-title { font-size: 11px; font-weight: 600; color: var(--text); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        .trace-title::before { content: '▶'; color: var(--accent); font-size: 14px; }
        .trace-step { margin-bottom: 6px; }
        .trace-an { animation: fadeSlideIn 0.4s ease-out both; }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .trace-line { display: flex; align-items: flex-start; gap: 8px; }
        .trace-icon { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
        .trace-icon.accent { background: rgba(122,162,247,0.15); }
        .trace-icon.orange { background: rgba(255,158,100,0.15); }
        .trace-icon.green { background: rgba(158,206,106,0.15); }
        .trace-icon.purple { background: rgba(187,154,247,0.15); }
        .trace-icon.red { background: rgba(247,118,142,0.15); }
        .trace-content { min-width: 0; }
        .trace-label { font-size: 12px; color: var(--text-bright); font-weight: 500; font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace; }
        .trace-detail { font-size: 11px; color: var(--text); margin-top: 2px; font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace; word-break: break-all; white-space: pre-wrap; }

        /* Input area */
        .input-area { display: flex; gap: 8px; padding: 12px 20px; background: var(--surface); border-top: none; flex-shrink: 0; }
        .input-area textarea { flex: 1; background: var(--surface-2); border: 1px solid var(--border); color: var(--text-bright); padding: 10px 14px; border-radius: var(--radius); font-size: 13px; resize: none; font-family: inherit; min-height: 42px; max-height: 100px; line-height: 1.4; }
        .input-area textarea:focus { outline: none; border-color: var(--accent); }
        .input-area textarea::placeholder { color: var(--text-dim); }

        /* Status */
        .status { padding: 4px 20px; font-size: 11px; color: var(--text-dim); background: var(--bg); flex-shrink: 0; }
        .status.loading { color: var(--orange); }
        .status.success { color: var(--green); }
        .status.error { color: var(--red); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* Animations */
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .trace-icon.puls { animation: pulse 1.2s infinite; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 Browser Agent Platform <span>Local v1</span></h1>
        <div class="controls">
            <input type="text" id="sessionId" placeholder="Session" value="default">
            <input type="password" id="apiKey" placeholder="OpenRouter Key">
            <select id="modelSelect"></select>
            <button class="btn btn-sm" id="setKeyBtn">Set Key</button>
            <button class="btn btn-sm" id="clearBtn">Clear</button>
        </div>
    </div>
    <div class="layout">
        <div class="sidebar">
            <h3>Available Tools</h3>
            <div id="toolList"></div>
        </div>
        <div class="main">
            <div class="chat-area">
                <div class="messages" id="messages">
                    <div class="msg system">Send a message to start. The agent may call tools to complete your request.</div>
                </div>
                <div class="trace" id="trace"></div>
            </div>
            <div class="status" id="status">Ready</div>
            <div class="input-area">
                <textarea id="userInput" placeholder="Try: How many words in: The quick brown fox jumps over the lazy dog" rows="1"></textarea>
                <button class="btn" id="sendBtn">Send</button>
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
